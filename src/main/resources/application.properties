# Base Configuration - Common settings for all environments
# Environment-specific overrides are in application-{profile}.properties

# Database Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# JPA/Hibernate Settings
logging.level.org.hibernate.SQL=DEBUG

# File Upload / Download variables
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB

# Session timeout
server.servlet.session.timeout=120m

# Chat: how recent (in hours) a message may still be deleted ("delete for
# everyone") by its sender. The backend enforces this; clients also read it via
# GET /checkfileattachalgo/messagedeletewindowhours to gate the delete option.
# Edit this single value to change the window everywhere. Default 24 hours.
chat.message.delete-window-hours=${CHAT_MESSAGE_DELETE_WINDOW_HOURS:24}

# Database Configuration (overridden by profile-specific files)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/herplat?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin@123}

# Server Port (overridden by profile-specific files)
server.port=${SERVER_PORT:9595}

# Logging (overridden by profile-specific files)
logging.file.name=${LOG_FILE_PATH:/var/log/herplatform/application.log}

# Secure Files Base Path (overridden by profile-specific files)
secure.files.base-path=${SECURE_FILES_PATH:/var/secure_files/files}

# JWT Configuration
jwt.secret=${JWT_SECRET:CardiRehabSecretKeyX12138yAn4}

# Resend Email API
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:noreply@cardirehab.com}

# Frontend URL (used in password reset email links)
app.frontend.url=${FRONTEND_URL:https://www.cardirehab.com}

# Account Deletion
# Grace window (in minutes) after a user requests account deletion. During this
# window the account is disabled and can be reactivated; once it elapses the
# sweep permanently purges the account and all its data. Shared by both the
# reactivation check and the purge sweep. Default 43200 = 30 days. Use a small
# value in test environments to exercise the full lifecycle quickly.
app.account.deletion-window-minutes=${ACCOUNT_DELETION_WINDOW_MINUTES:43200}

# Cron for the purge sweep that hard-deletes expired accounts. Default: daily at
# 03:00. Test environments can run it more frequently (e.g. every 5 minutes).
app.account.deletion-sweep-cron=${ACCOUNT_DELETION_SWEEP_CRON:0 0 3 * * *}

# Mobile App Version Gate
# `latest` is the newest published build; below it the app shows a dismissible
# "update available" prompt. `min` is the oldest build still supported; below it
# the app shows a blocking "update required" dialog.
app.version.android.latest=${APP_ANDROID_LATEST:2.0.0}
app.version.android.min=${APP_ANDROID_MIN:2.0.0}
app.version.android.update-url=${APP_ANDROID_URL:https://play.google.com/store/apps/details?id=com.example.cardirehab_mobile}
app.version.ios.latest=${APP_IOS_LATEST:2.0.0}
app.version.ios.min=${APP_IOS_MIN:2.0.0}
app.version.ios.update-url=${APP_IOS_URL:https://apps.apple.com/app/cardirehab}

# Push notifications (Firebase Cloud Messaging)
# Path to the Firebase Admin service-account JSON. Relative paths resolve from
# the working directory the app is started in. If the file is missing or
# firebase.enabled=false, push sending is disabled and the rest of the app is
# unaffected.
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
