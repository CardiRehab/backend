# Preprod Environment Configuration

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/preprod_herplat?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin@123}

# Server Port
server.port=${SERVER_PORT:9596}

# Logging
logging.file.name=${LOG_FILE_PATH:/var/log/herplatform-preprod/application.log}
logging.level.org.hibernate.SQL=DEBUG

# Secure Files Base Path
secure.files.base-path=${SECURE_FILES_PATH:/var/secure_files/files}

# JWT Secret
jwt.secret=${JWT_SECRET:CardiRehabSecretKeyX12138yAn4}

